# This file is a template, and might need editing before it works on your project.
# This is a sample GitLab CI/CD configuration file that should run without any modifications.
# It demonstrates a basic 3 stage CI/CD pipeline. Instead of real tests or scripts,
# it uses echo commands to simulate the pipeline execution.
#
# A pipeline is composed of independent jobs that run scripts, grouped into stages.
# Stages run in sequential order, but jobs within stages run in parallel.
#
# For more information, see: https://docs.gitlab.com/ee/ci/yaml/#stages
#
# You can copy and paste this template into a new `.gitlab-ci.yml` file.
# You should not add this template to an existing `.gitlab-ci.yml` file by using the `include:` keyword.
#
# To contribute improvements to CI/CD templates, please follow the Development guide at:
# https://docs.gitlab.com/development/cicd/templates/
# This specific template is located at:
# https://gitlab.com/gitlab-org/gitlab/-/blob/master/lib/gitlab/ci/templates/Getting-Started.gitlab-ci.yml

stages:
  - prepare
  - build

# Define the manual input variable for workflow_dispatch parity
variables:
  IMAGE_NAME: "${CI_REGISTRY_IMAGE}"
  VERSIONS:
    value: ""
    description: 'Comma-separated Cloudreve versions to build (e.g. "4.17.0,4.16.1"). Leave empty to use the default list.'

# This controls when the entire pipeline is allowed to run
workflow:
  rules:
    - if: $CI_COMMIT_BRANCH == "master"
    - if: $CI_PIPELINE_SOURCE == "web"

prepare_job:
  stage: prepare
  image: badouralix/curl-jq:latest # A lightweight image with jq installed
  script:
    - DEFAULT_VERSIONS="4.17.0"
    # If the user did not provide input, fall back to the default
    - |
      if [ -z "$VERSIONS" ]; then
        VERSIONS="$DEFAULT_VERSIONS"
      fi
    - FIRST_VERSION=$(echo "$VERSIONS" | cut -d',' -f1)
    - MATRIX_JSON=$(echo "$VERSIONS" | tr ',' '\n' | jq -R . | jq -sc .)
    # Save variables to a dotenv file so the next stage can inherit them dynamically
    - echo "LATEST_VERSION=$FIRST_VERSION" > build.env
    - echo "MATRIX_JSON=$MATRIX_JSON" >> build.env
  artifacts:
    reports:
      dotenv: build.env

docker_job:
  stage: build
  image: docker:24.0.5 # Native docker CLI support
  services:
    - docker:24.0.5-dind # Enables Docker-in-Docker for building images
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
  needs:
    - job: prepare_job
      artifacts: true
  before_script:
    # Set up QEMU for multi-platform cross-compilation (linux/arm64, linux/arm/v7)
    - docker run --privileged --rm tonistiigi/binfmt --install all
    # Initialize a multi-platform Buildx builder instance
    - docker buildx create --use --name mybuilder
    - docker buildx inspect --bootstrap
    # Authenticate with DockerHub
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin
  script:
    # Fetch the current matrix item value. GitLab matrix items map to a variable named after the JSON array key
    - CURRENT_VERSION="$value"
    # Build out the target tag strings
    - TAG_ARGS="-t ${IMAGE_NAME}/cloudreve:${CURRENT_VERSION}"
    - |
      if [ "$CURRENT_VERSION" = "$LATEST_VERSION" ]; then
        TAG_ARGS="$TAG_ARGS -t ${IMAGE_NAME}/cloudreve:latest -t ${IMAGE_NAME}/cloudreve:4"
      fi
    # Execute the multi-architecture build and push
    - |
      docker buildx build \
        --platform linux/amd64,linux/arm64,linux/arm/v7 \
        --build-arg CLOUDREVE_VERSION=${CURRENT_VERSION} \
        ${TAG_ARGS} \
        --push .
