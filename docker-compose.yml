services:
    cloudreve:
        build:
            context: .
            args:
                CLOUDREVE_VERSION: ${CLOUDREVE_VERSION:-4.17.0}
                INSTALL_ARIA2: ${INSTALL_ARIA2:-0}
                DEBIAN_SUITE: ${DEBIAN_SUITE:-bookworm}
        image: cloudreve:${CLOUDREVE_VERSION:-4.17.0}-local
        environment:
            TZ: ${TZ:-America/Toronto}
            CR_ENABLE_ARIA2: ${CR_ENABLE_ARIA2:-0}
        ports:
            - 5212:5212
            - 6888:6888
            - 6888:6888/udp
        volumes:
            - cloudreve-data:/cloudreve/data
        networks:
            - cloudreve-network
        restart: unless-stopped


networks:
    cloudreve-network:

volumes:
    cloudreve-data: